server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support for React Router SPA (Single Page Application)
    # This prevents 404 errors when a user refreshes a subpage like /report
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service. The upstream name matches both
    # docker-compose.yml and the Kubernetes Service in k8s/.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Optional: Cache static assets like images, CSS, JS
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}

apiVersion: v1
kind: Secret
metadata:
  name: monica-secrets
  namespace: monica
type: Opaque
stringData:
  LIVEKIT_URL: "<your-livekit-url>"
  LIVEKIT_API_KEY: "<your-livekit-api-key>"
  LIVEKIT_API_SECRET: "<your-livekit-api-secret>"
  OPENAI_API_KEY: "<your-openai-api-key>"
  DEEPGRAM_API_KEY: "<your-deepgram-api-key>"
  ELEVEN_API_KEY: "<your-elevenlabs-api-key>"
  TAVUS_API_KEY: "<your-tavus-api-key>"
  TAVUS_REPLICA_ID: "<your-tavus-replica-id>"
  TAVUS_PERSONA_ID: "<your-tavus-persona-id>"
  SIMLI_API_KEY: "<your-simli-api-key>"
  SIMLI_FACE_ID: "<your-simli-face-id>"
  SUPABASE_URL: "<your-postgres-connection-string>"
  FORMSPREE_URL: "<your-formspree-endpoint>"
  ADMIN_SECRET: "<optional-report-admin-secret>"
  ALLOWED_ORIGINS: "http://localhost,http://localhost:5173,http://monica.localhost"


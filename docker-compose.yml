
services:
  # In-memory data store — rate limiting, session caching, future task queues
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The React Vite UI running on a lightning-fast Nginx web server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite needs the Clerk key at build time to embed it into the static HTML/JS files
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "80:80"
    depends_on:
      - backend

  # The FastAPI server handling database operations and LiveKit tokens
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  # The Python Worker executing the Monica AI Engine (LiveKit)
  agent:
    build:
      context: .
      dockerfile: agent.Dockerfile
    env_file:
      - .env
    depends_on:
      - backend
